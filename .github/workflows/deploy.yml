name: Deploy to EC2 with Docker

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t carvilla-img:latest .

      - name: Stop Old Container (if exists)
        run: |
          docker stop carvilla || true
          docker rm carvilla || true

      - name: Run Docker Container
        run: |
          docker run -d -p 80:80 --name carvilla carvilla-img:latest
